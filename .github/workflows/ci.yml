name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y perl shellcheck \
            libwww-perl liblwp-protocol-https-perl libjson-perl

      - name: Perl syntax check
        run: perl -I t/stubs -c LightbitsPlugin.pm

      - name: Perl taint mode check
        run: perl -T -I t/stubs -c LightbitsPlugin.pm

      - name: Run unit tests
        run: prove t/

      - name: ShellCheck
        run: shellcheck scripts/install.sh scripts/uninstall.sh
